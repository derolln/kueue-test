# 6 plain pods, each sleeping 5 seconds, submitted to Kueue via the local queue.
# Kueue will admit them according to BestEffortFIFO order and available quota.
---
apiVersion: v1
kind: Pod
metadata:
  name: test-pod-1
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: test-local-queue
spec:
  restartPolicy: Never
  containers:
  - name: sleeper
    image: busybox:1.36
    command: ["sh", "-c", "echo 'pod-1 started'; sleep 5; echo 'pod-1 done'"]
    resources:
      requests:
        cpu: "250m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "64Mi"
