# Kueue configuration with pod integration enabled.
# Applied after Kueue is installed to enable plain pod scheduling.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kueue-manager-config
  namespace: kueue-system
data:
  controller_manager_config.yaml: |
    apiVersion: config.kueue.x-k8s.io/v1beta1
    kind: Configuration
    health:
      healthProbeBindAddress: :8081
    metrics:
      bindAddress: :8080
    webhook:
      port: 9443
    integrations:
      frameworks:
      - "batch/job"
      - "pod"
    manageJobsWithoutQueueName: false
